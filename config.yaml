# config.yaml
# Конфигурационный файл для эксперимента по ансамблированию временных рядов (M4)

# Общие настройки
seed: 42                       # фиксированный seed для воспроизводимости
n_series_per_freq: 100      # количество рядов на частоту (Yearly, Quarterly, Monthly)
data_dir: "./data/m4_selected/"   # директория для обработанных данных
raw_data_dir: "./data/m4_raw/"     # директория для сырых данных
base_url: "https://raw.githubusercontent.com/Mcompetitions/M4-methods/master/Dataset/"  # источник M4

# Горизонты прогнозирования для каждой частоты (согласно M4)
freq_horizon:
  Yearly: 6
  Quarterly: 8
  Monthly: 18

# Сезонные периоды для каждой частоты
seasonality:
  Yearly: 1
  Quarterly: 4
  Monthly: 12

# Параметры CatBoost (для глобального обучения и стекинга)
catboost_params:
  iterations: 200
  learning_rate: 0.1
  depth: 6
  loss_function: MultiRMSE      # важно для многомерной цели (прогноз на весь горизонт)
  random_state: 42
  verbose: False

# Параметры PatchTST (из библиотеки neuralforecast)
patchtst_params:
  input_size: 24
  n_heads: 4
  hidden_size: 16
  encoder_layers: 2
  max_steps: 500

# Параметры N-BEATS
nbeats_params:
  input_size: 24
  max_steps: 500

# Параметры Theta (сезонность берётся из seasonality, дополнительных параметров не требуется)
theta_params: {}

# Параметры мета-модели CatBoost для финального стекинга
meta_model_params:
  iterations: 500
  learning_rate: 0.05
  depth: 6
  loss_function: RMSE           # одномерная цель (пошаговое предсказание)
  random_state: 42
  verbose: False

# Количество фолдов для кросс-валидации по рядам
n_folds_cv: 3